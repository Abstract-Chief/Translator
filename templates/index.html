<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Переводчик</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body>

<!-- HEADER -->
<header class="gb_Ld gb_ud">
  <div class="gb_Nd gb_vd">
    <div class="gb_Od gb_wd">
      <a class="gb_Pd gb_xd" href="/" aria-label="Google Переводчик">
        <svg class="logo-google" focusable="false" viewBox="0 0 272 92" width="92" height="30" xmlns="http://www.w3.org/2000/svg">
          <path d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z" fill="#EA4335"/>
          <path d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z" fill="#FBBC05"/>
          <path d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z" fill="#4285F4"/>
          <path d="M225 3v65h-9.5V3h9.5z" fill="#34A853"/>
          <path d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z" fill="#EA4335"/>
          <path d="M35.29 41.41V32H67c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.02 9.66C16.32 69.35.36 53.89.36 34.91.36 15.93 16.32.47 35.3.47c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 11.17-24.7 25.03 0 13.86 10.84 25.03 24.7 25.03 8.99 0 14.11-3.61 17.39-6.89 2.66-2.66 4.41-6.46 5.1-11.65l-22.49.01z" fill="#4285F4"/>
        </svg>
        <span class="header-translate-label">Переводчик</span>
      </a>
    </div>
    <div class="gb_Rd gb_zd">
      <nav class="gb_Sd">
        <a class="header-nav-link" href="https://translate.google.com/about/?hl=ru">О Переводчике Google</a>
      </nav>
      <div class="header-actions">
        <button class="signin-btn signout-btn" onclick="doLogout()">Выйти</button>
      </div>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tabs-container">
  <div class="tabs-inner">
    <button class="tab-btn tab-active">
      <span class="material-icons tab-icon">subject</span>
      Текст
    </button>
    <button class="tab-btn">
      <span class="material-icons tab-icon">image</span>
      Изображения
    </button>
    <button class="tab-btn">
      <span class="material-icons tab-icon">description</span>
      Документы
    </button>
    <button class="tab-btn">
      <span class="material-icons tab-icon">language</span>
      Сайты
    </button>
  </div>
</div>

<!-- MAIN TRANSLATOR -->
<main class="translator-main">
  <div class="translator-card">

    <!-- LANGUAGE BAR -->
    <div class="lang-bar">
      <!-- SOURCE LANGUAGE -->
      <div class="lang-selector src-selector">
        <button class="lang-btn lang-btn-detect lang-active" data-lang="auto" onclick="selectSrcLang(this, 'auto')">Определить язык</button>
        <button class="lang-btn" data-lang="sk" onclick="selectSrcLang(this, 'sk')">Словацкий</button>
        <button class="lang-btn" data-lang="ru" onclick="selectSrcLang(this, 'ru')">Русский</button>
        <button class="lang-btn" data-lang="uk" onclick="selectSrcLang(this, 'uk')">Украинский</button>
        <button class="lang-more-btn" onclick="toggleSrcDropdown(event)">
          <span class="material-icons">expand_more</span>
        </button>
        <!-- dropdown -->
        <div class="lang-dropdown" id="src-dropdown">
          <div class="lang-search-wrap">
            <span class="material-icons lang-search-icon">search</span>
            <input type="text" class="lang-search-input" placeholder="Поиск языков" oninput="filterLangs('src-dropdown', this.value)"/>
          </div>
          <ul class="lang-list" id="src-lang-list"></ul>
        </div>
      </div>

      <!-- SWAP -->
      <button class="swap-btn" id="swap-btn" onclick="swapLanguages()" title="Поменять языки">
        <span class="material-icons">swap_horiz</span>
      </button>

      <!-- TARGET LANGUAGE -->
      <div class="lang-selector tgt-selector">
        <button class="lang-btn lang-active" data-lang="ru" onclick="selectTgtLang(this, 'ru')">Русский</button>
        <button class="lang-btn" data-lang="sk" onclick="selectTgtLang(this, 'sk')">Словацкий</button>
        <button class="lang-btn" data-lang="uk" onclick="selectTgtLang(this, 'uk')">Украинский</button>
        <button class="lang-more-btn" onclick="toggleTgtDropdown(event)">
          <span class="material-icons">expand_more</span>
        </button>
        <!-- dropdown -->
        <div class="lang-dropdown" id="tgt-dropdown">
          <div class="lang-search-wrap">
            <span class="material-icons lang-search-icon">search</span>
            <input type="text" class="lang-search-input" placeholder="Поиск языков" oninput="filterLangs('tgt-dropdown', this.value)"/>
          </div>
          <ul class="lang-list" id="tgt-lang-list"></ul>
        </div>
      </div>
    </div>

    <!-- TEXT AREAS -->
    <div class="textarea-row">

      <!-- SOURCE -->
      <div class="textarea-panel src-panel">
        <div class="textarea-wrap">
          <textarea
            id="src-text"
            class="src-textarea"
            placeholder="Введите текст"
            maxlength="5000"
            oninput="onInput()"
            autofocus
          ></textarea>
          <div class="src-actions">
            <button class="icon-btn clear-btn" id="clear-btn" onclick="clearInput()" title="Очистить" style="display:none">
              <span class="material-icons">close</span>
            </button>
            <span class="char-count" id="char-count">0 / 5000</span>
          </div>
        </div>
        <div class="panel-footer src-footer">
          <button class="icon-btn" id="ai-btn" onclick="askAI()" title="Прослушать">
            <span class="material-icons">volume_up</span>
          </button>
          <button class="icon-btn copy-btn" onclick="copySrc()" title="Копировать">
            <span class="material-icons">content_copy</span>
          </button>
        </div>
      </div>

      <!-- DIVIDER -->
      <div class="panel-divider"></div>

      <!-- TARGET -->
      <div class="textarea-panel tgt-panel">
        <div class="textarea-wrap">
          <div id="tgt-text" class="tgt-textarea">
            <!-- Translation appears here -->
          </div>
          <div class="tgt-loading" id="tgt-loading" style="display:none">
            <div class="loading-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
        <div class="panel-footer tgt-footer">
          <button class="icon-btn" id="ai-btn" onclick="askAI()" title="Прослушать">
            <span class="material-icons">volume_up</span>
          </button>
          <button class="icon-btn copy-btn" onclick="copyTgt()" title="Копировать">
            <span class="material-icons">content_copy</span>
          </button>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">
    <a href="#">О Переводчике Google</a>
    <a href="#">Правила и принципы</a>
    <a href="#">Справка</a>
    <a href="#">Отправить отзыв</a>
    <a href="#">О Google</a>
  </div>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
